<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact・お問い合わせ - ProductX | プロダクト開発・DX支援</title>
    <meta name="description" content="ProductXへのお問い合わせ。プロダクト開発・DX支援に関するご相談はお気軽にご連絡ください。">
    <meta name="keywords" content="ProductX,お問い合わせ,問い合わせ,コンタクト,相談,プロダクト開発">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://productx.jp/contact/">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="apple-touch-icon" href="/images/favicon.png">

    <!-- OGP -->
    <meta property="og:title" content="Contact・お問い合わせ - ProductX">
    <meta property="og:description" content="ProductXへのお問い合わせ。プロダクト開発・DX支援に関するご相談はお気軽にご連絡ください。">
    <meta property="og:image" content="https://productx.jp/images/ogp.png">
    <meta property="og:url" content="https://productx.jp/contact/">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ProductX">
    <meta property="og:locale" content="ja_JP">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .contact-form {
            max-width: 800px;
            margin: 0 auto;
            background: var(--color-bg);
            padding: 60px;
            border-radius: 16px;
            border: 1px solid var(--color-border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .form-note {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            margin-top: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .contact-form {
                padding: 30px 15px;
            }
        }

        /* Googleフォームのiframeスタイル */
        .google-form-wrapper {
            width: 100%;
            min-height: 1400px;
            display: flex;
            justify-content: center;
        }

        .google-form-wrapper iframe {
            width: 100%;
            max-width: 700px;
            height: 1400px;
            border: none;
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .google-form-wrapper {
                min-height: 1200px;
            }

            .google-form-wrapper iframe {
                height: 1200px;
            }
        }

        @media (max-width: 480px) {
            .google-form-wrapper {
                min-height: 1100px;
            }

            .google-form-wrapper iframe {
                height: 1100px;
            }
        }

        @media (max-width: 375px) {
            .google-form-wrapper {
                min-height: 1200px;
            }

            .google-form-wrapper iframe {
                height: 1200px;
            }
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="/" class="header__logo">
            <img src="/images/logo.png" alt="ProductX">
        </a>
        <button class="header__hamburger" id="js-hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="header__nav">
            <ul class="header__list">
                <li class="header__item"><a href="/about/">Mission</a></li>
                <li class="header__item"><a href="/services/">Services</a></li>
                <li class="header__item"><a href="/news/">News</a></li>
                <li class="header__item"><a href="/contact/" class="btn btn--primary">Start</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="page-header">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="container">
                <h1 class="page-title reveal-text">Contact</h1>
                <p class="reveal-text">Let's build the future together.</p>
            </div>
        </div>

        <section class="section">
            <div class="container">
                <div class="contact-form reveal-text">
                    <!-- Googleフォーム埋め込み -->
                    <div class="google-form-wrapper">
                        <iframe
                            src="https://docs.google.com/forms/d/e/1FAIpQLSfDZZkOq4FjTnrtwvZInn-lvfjrAkNoQxTZ_WhFMtLLDTcN9Q/viewform?embedded=true"
                            width="700" height="1600" frameborder="0" marginheight="0"
                            marginwidth="0">読み込んでいます…</iframe>
                    </div>
                    <p class="form-note">
                        お問い合わせ内容は、<a href="/privacy/" style="text-decoration: underline;">プライバシーポリシー</a>に基づき管理いたします。
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__cta">
                <h2 class="footer__cta-title">Ready to unleash potential?</h2>
                <a href="/contact/" class="btn btn--primary btn--large">Start</a>
            </div>

            <div class="footer__bottom">
                <a href="/" class="footer__logo">ProductX</a>
                <nav class="footer__nav">
                    <ul class="footer__list">
                        <li><a href="/about/">Mission</a></li>
                        <li><a href="/services/">Services</a></li>
                        <li><a href="/news/">News</a></li>
                        <li><a href="/contact/">Contact</a></li>
                    </ul>
                </nav>
                <div class="footer__legal">
                    <a href="/privacy/">Privacy Policy</a>
                    <a href="/terms/">Terms of Service</a>
                </div>
                <p class="footer__copyright">&copy; 2025 ProductX Inc.</p>
            </div>
        </div>
    </footer>

    <script src="/js/main.js"></script>
</body>

</html>
