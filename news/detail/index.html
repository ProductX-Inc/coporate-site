<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Detail - ProductX</title>
    <meta name="description" content="ProductXの最新情報詳細。">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="apple-touch-icon" href="/images/favicon.png">

    <!-- OGP -->
    <meta property="og:title" content="News Detail - ProductX">
    <meta property="og:description" content="ProductXの最新情報詳細。">
    <meta property="og:image" content="/images/ogp.png">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="ProductX">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .news-detail {
            max-width: 800px;
            margin: 0 auto;
        }

        .news-detail__header {
            margin-bottom: 40px;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 20px;
        }

        .news-detail__date {
            color: var(--color-text-muted);
            font-family: var(--font-en);
            font-size: 0.9rem;
            display: block;
            margin-bottom: 10px;
        }

        .news-detail__title {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .news-detail__category {
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid var(--color-accent);
            color: var(--color-accent);
            border-radius: 50px;
            font-size: 0.8rem;
        }

        .news-detail__content {
            line-height: 1.8;
            font-size: 1rem;
            margin-bottom: 60px;
        }

        /* Rich Text Styles */
        .news-detail__content h2 {
            font-size: 1.5rem;
            margin: 40px 0 20px;
            border-left: 4px solid var(--color-accent);
            padding-left: 15px;
        }

        .news-detail__content h3 {
            font-size: 1.25rem;
            margin: 30px 0 15px;
        }

        .news-detail__content p {
            margin-bottom: 20px;
        }

        .news-detail__content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
        }

        .news-back {
            text-align: center;
            margin-top: 60px;
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="/" class="header__logo">
            <img src="/images/logo.png" alt="ProductX">
        </a>
        <button class="header__hamburger" id="js-hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="header__nav">
            <ul class="header__list">
                <li class="header__item"><a href="/about/">Mission</a></li>
                <li class="header__item"><a href="/services/">Services</a></li>
                <li class="header__item"><a href="/news/">News</a></li>
                <li class="header__item"><a href="/contact/" class="btn btn--primary">Start</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="page-header">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="container">
                <h1 class="page-title reveal-text">News</h1>
                <p class="reveal-text">Update Information</p>
            </div>
        </div>

        <section class="section">
            <div class="container">
                <div id="news-detail-container" class="news-detail">
                    <!-- Dynamic Content -->
                    <div style="text-align: center; padding: 40px;">Loading...</div>
                </div>

                <div class="news-back">
                    <a href="/news/" class="btn btn--secondary">Back to News</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer__cta">
                <h2 class="footer__cta-title">Ready to unleash potential?</h2>
                <a href="/contact/" class="btn btn--primary btn--large">Start</a>
            </div>

            <div class="footer__bottom">
                <a href="/" class="footer__logo">ProductX</a>
                <nav class="footer__nav">
                    <ul class="footer__list">
                        <li><a href="/about/">Mission</a></li>
                        <li><a href="/services/">Services</a></li>
                        <li><a href="/news/">News</a></li>
                        <li><a href="/contact/">Contact</a></li>
                    </ul>
                </nav>
                <div class="footer__legal">
                    <a href="/privacy/">Privacy Policy</a>
                    <a href="/terms/">Terms of Service</a>
                </div>
                <p class="footer__copyright">&copy; 2025 ProductX Inc.</p>
            </div>
        </div>
    </footer>

    <script src="/js/main.js"></script>
    <script src="/js/news.js"></script>
</body>

</html>
